<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 215 72" width="100%" height="100%">
  <defs>
    <!-- Primary swoosh gradient: richer aerospace tones -->
    <linearGradient id="xSwoosh" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a84432" />
      <stop offset="50%" stop-color="#c47a4a" />
      <stop offset="100%" stop-color="#d4956b" />
    </linearGradient>
    <!-- Subtle glow behind the X -->
    <filter id="xGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur" />
      <feComponentTransfer in="blur" result="softGlow">
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="softGlow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <!-- Tiny shadow under wordmark for depth -->
    <filter id="wordmarkShadow" x="-5%" y="-10%" width="110%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Main wordmark group with subtle shadow -->
  <g filter="url(#wordmarkShadow)">
    <!-- QUARK text -->
    <text x="0" y="44" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="900" font-size="38" letter-spacing="5" fill="#1a1410">QUARK</text>

    <!-- The sleek aerospace X -->
    <g transform="translate(162, 8)" filter="url(#xGlow)">
      <!-- Back diagonal of X — slightly thickened -->
      <path d="M 0 0 L 17 38 L 26 38 L 9 0 Z" fill="#1a1410"/>
      <!-- Accelerated swoop of X with sharper taper -->
      <path d="M 31 0 Q 8 14 0 38 L 9 38 Q 17 16 39 0 Z" fill="url(#xSwoosh)" />
    </g>
  </g>

  <!-- TECH subtext — lightweight, tracked out, aligned under QUARK -->
  <text x="3" y="64" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="300" font-size="13" letter-spacing="8" fill="#8a7e74">TECH</text>
</svg>

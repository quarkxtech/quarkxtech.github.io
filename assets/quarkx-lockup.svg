<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 60" width="100%" height="100%">
  <defs>
    <linearGradient id="xSwoosh" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7a2f2d" />
      <stop offset="100%" stop-color="#b26c3d" />
    </linearGradient>
  </defs>
  <!-- QUARK text -->
  <text x="0" y="42" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="900" font-size="34" letter-spacing="4" fill="#1f1814">QUARK</text>
  
  <!-- The sleek aerospace X, modeled after SpaceX logo dynamics -->
  <g transform="translate(148, 10)">
    <!-- Back diagonal of X -->
    <path d="M 0 0 L 16 36 L 24 36 L 8 0 Z" fill="#1f1814"/>
    <!-- Accelerated swoop of X -->
    <path d="M 28 0 Q 7 13 0 36 L 8 36 Q 15 15 36 0 Z" fill="url(#xSwoosh)" />
  </g>
</svg>
